baseURL = "https://logandawson.com/"
languageCode = "en-us"
title = "Logan Dawson"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "Security research, HackTheBox writeups, and homelab adventures"
  author = "Logan Dawson"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "dark"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Logan Dawson"
    Content = "Security enthusiast, CTF player, and homelab tinkerer. Writing about HackTheBox machines, offensive security, and things I break along the way."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/CHANGEME"

[params.assets]
  disableFingerprinting = false

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "writeups"
  name = "Writeups"
  url = "/writeups/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40
